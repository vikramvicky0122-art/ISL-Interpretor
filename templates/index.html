<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ISL Interpreter</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: white;
        text-align: center;
    }

    h1 {
        margin: 20px;
        font-size: 28px;
    }

    .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
    }

    video {
        width: 400px;
        height: 300px;
        border-radius: 15px;
        background: black;
        border: 3px solid #38bdf8;
    }

    canvas {
        display: none;
    }

    .output {
        width: 400px;
        min-height: 60px;
        background: #1e293b;
        border-radius: 10px;
        padding: 15px;
        font-size: 20px;
        font-weight: bold;
    }

    .confidence {
        width: 400px;
        font-size: 14px;
        color: #94a3b8;
        margin-top: -10px;
    }

    .buttons {
        display: flex;
        gap: 15px;
    }

    button {
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
        font-weight: bold;
    }

    .start { background: #22c55e; color: black; }
    .stop { background: #ef4444; color: white; }
    .speak { background: #3b82f6; color: white; }

    button:hover {
        opacity: 0.8;
    }

    .status {
        font-size: 12px;
        color: #64748b;
        margin-top: 10px;
    }
</style>
</head>

<body>

<h1>🤟 ISL Interpreter</h1>

<div class="container">

    <!-- Camera -->
    <video id="webcam" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <!-- Output -->
    <div class="output" id="prediction">
        Waiting for prediction...
    </div>
    <div class="confidence" id="confidence"></div>

    <!-- Buttons -->
    <div class="buttons">
        <button class="start" onclick="startCamera()">Start</button>
        <button class="stop" onclick="stopCamera()">Stop</button>
        <button class="speak" onclick="speakText()">Speak</button>
    </div>

    <div class="status" id="status">Ready</div>

</div>

<script>
let video = document.getElementById("webcam");
let canvas = document.getElementById("canvas");
let predictionBox = document.getElementById("prediction");
let confidenceBox = document.getElementById("confidence");
let statusBox = document.getElementById("status");
let stream;
let isRunning = false;
let captureInterval;

// Start Camera
async function startCamera() {
    try {
        statusBox.innerText = "🔵 Requesting camera access...";
        
        stream = await navigator.mediaDevices.getUserMedia({ 
            video: { 
                width: { ideal: 400 }, 
                height: { ideal: 300 },
                facingMode: 'user'
            },
            audio: false
        });
        
        video.srcObject = stream;
        isRunning = true;
        statusBox.innerText = "🟢 Camera active - Processing frames...";
        
        // Wait for video to be ready
        video.onloadedmetadata = () => {
            startPredictions();
        };
    } catch (error) {
        console.error("Camera error:", error);
        statusBox.innerText = "❌ Camera access denied";
        predictionBox.innerText = "Camera access required";
        
        if (error.name === 'NotAllowedError') {
            alert("❌ Camera permission denied. Please allow camera access and reload.");
        } else if (error.name === 'NotFoundError') {
            alert("❌ No camera found. Please check your device.");
        } else {
            alert("❌ Error: " + error.message);
        }
    }
}

// Stop Camera
function stopCamera() {
    if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
    }
    isRunning = false;
    clearInterval(captureInterval);
    predictionBox.innerText = "Camera stopped";
    confidenceBox.innerText = "";
    statusBox.innerText = "⚫ Camera stopped";
}

// Send frames to backend for prediction
function startPredictions() {
    let frameCount = 0;
    captureInterval = setInterval(() => {
        if (!isRunning || !video.srcObject) return;

        try {
            // Check if video has valid dimensions
            if (video.videoWidth <= 0 || video.videoHeight <= 0) {
                console.warn("Video not yet loaded");
                return;
            }
            
            // Draw video frame to canvas
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            let ctx = canvas.getContext("2d");
            
            // Flip horizontally (mirror effect)
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(video, 0, 0);
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);

            // Convert canvas to blob with higher quality
            canvas.toBlob(blob => {
                if (!blob) {
                    console.warn("Failed to create blob");
                    return;
                }
                
                frameCount++;
                console.log(`Sending frame ${frameCount}, size: ${blob.size} bytes`);
                
                let formData = new FormData();
                formData.append("frame", blob, "frame.jpg");

                fetch("/predict", {
                    method: "POST",
                    body: formData
                })
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }
                    return response.json();
                })
                .then(data => {
                    if (data.error) {
                        console.error("Server error:", data.error);
                        statusBox.innerText = "⚠️ " + data.error;
                    } else {
                        console.log("Prediction:", data.letter, `(${(data.confidence*100).toFixed(1)}%)`);
                        predictionBox.innerText = data.letter || "No hand detected";
                        confidenceBox.innerText = data.confidence ? 
                            `Confidence: ${(data.confidence * 100).toFixed(1)}%` : "";
                        statusBox.innerText = "🟢 Processing frame " + frameCount;
                    }
                })
                .catch(error => {
                    console.error("Fetch error:", error);
                    statusBox.innerText = "⚠️ Network error: " + error.message;
                });
            }, "image/jpeg", 0.95); // Higher quality JPEG
        } catch (e) {
            console.error("Frame capture error:", e);
            statusBox.innerText = "⚠️ Capture error: " + e.message;
        }
    }, 500); // Send frame every 500ms
}

// Text to Speech
function speakText() {
    let text = predictionBox.innerText;
    if (text === "Waiting for prediction..." || text === "Camera stopped" || text === "No hand detected") {
        alert("Please make a valid hand gesture first!");
        return;
    }
    
    try {
        let speech = new SpeechSynthesisUtterance(text);
        speech.lang = "en-US";
        speech.rate = 1.0;
        speech.pitch = 1.0;
        window.speechSynthesis.speak(speech);
        statusBox.innerText = "🔊 Speaking...";
    } catch (e) {
        console.error("Speech error:", e);
        alert("Text-to-speech not supported in your browser");
    }
}

// Check server health on page load
window.addEventListener('load', () => {
    fetch('/health')
        .then(r => r.json())
        .then(data => {
            console.log("Server health:", data);
            if (!data.model_loaded) {
                statusBox.innerText = "⚠️ Model not loaded. Check console.";
                alert("Model failed to load. Check server logs.");
            }
        })
        .catch(e => console.error("Health check failed:", e));
});
</script>

</body>
</html>
